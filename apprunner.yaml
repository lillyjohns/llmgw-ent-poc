version: 1.0
runtime: nodejs20
build:
  commands:
    build:
      - npm ci
      - npx tsc --outDir dist
run:
  command: node dist/proxy/server.js
  network:
    port: 4000
  env:
    - name: NODE_ENV
      value: production
    - name: AWS_REGION
      value: us-east-1
    - name: CONFIG_PATH
      value: ./config/gateway-config.yaml
